<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local Sites</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #14141a;
  --surface-hover: #1c1c24;
  --border: #2a2a36;
  --text: #e8e6e3;
  --text-muted: #8a8a9a;
  --text-dim: #5a5a6a;
  --accent: #c4a35a;
  --accent-dim: rgba(196, 163, 90, 0.15);
  --added: #4a9;
  --removed: #c55;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'Manrope', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  display: flex;
  padding: 2.5rem 3rem 0;
  min-height: 100vh;
}
::selection { background: var(--accent-dim); color: var(--accent); }
.grain {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 9999;
}
.container {
  width: 100%;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 2.5rem);
}
h1 {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 0.3rem;
}
.subtitle {
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  margin-bottom: 2.5rem;
}
.section-frame {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem;
  background: var(--surface);
}
.section-frame h2 {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--text-muted);
  margin-bottom: 0.8rem;
}
.sites-frame {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.sites-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sites-scroll::-webkit-scrollbar { width: 6px; }
.sites-scroll::-webkit-scrollbar-track { background: transparent; }
.sites-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
ul { list-style: none; }
ul li {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.6rem;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
ul li:hover {
  border-color: var(--accent);
  background: var(--surface-hover);
}
ul li a {
  display: block;
  padding: 1rem 1.2rem;
  color: var(--text);
  text-decoration: none;
}
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.site-ago {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}
.site-title {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--accent);
}
li:hover .site-title { color: var(--accent); }
.site-desc {
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 300;
  margin-top: 0.2rem;
}
.site-file {
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.7rem;
  margin-top: 0.3rem;
}
.site-meta {
  display: flex; gap: 1.5rem;
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.7rem;
  margin-top: 0.25rem;
}
.site-delete {
  position: absolute;
  bottom: 0.8rem;
  right: 1rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 0.85rem;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s, color 0.2s, background 0.2s;
}
li:hover .site-delete { opacity: 1; }
.site-delete:hover { color: var(--removed); background: rgba(204, 85, 85, 0.1); }
.empty {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 1.5rem 1.2rem;
}
.log-frame {
  margin-top: 1rem;
  margin-bottom: 1.5rem;
  height: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.log-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.log-scroll::-webkit-scrollbar { width: 6px; }
.log-scroll::-webkit-scrollbar-track { background: transparent; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.log-entry {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  padding: 0.2rem 0;
  display: flex;
  gap: 0.8rem;
  align-items: baseline;
  white-space: nowrap;
}
.log-time { color: var(--text-dim); width: 8ch; flex-shrink: 0; }
.log-action { width: 9ch; flex-shrink: 0; }
.log-installed { color: var(--added); }
.log-removed { color: var(--removed); }
.log-present { color: var(--text-muted); }
.log-name { color: var(--accent); width: 20ch; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
.log-file { color: var(--text-dim); width: 20ch; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
.log-desc { color: var(--text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.log-empty {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  padding: 0.5rem 0;
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <h1>Local Sites</h1>
  <p class="subtitle">~/.local-server/sites</p>
  <div class="section-frame sites-frame">
    <h2>Sites</h2>
    <div class="sites-scroll">
      <ul id="sites">
        {{range .Items}}{{if and (ne .Name ".DS_Store") (ne .Name "activity.log")}}
        <li><a href="{{.URL}}" data-file="{{.Name}}" data-mod="{{.ModTime.Format "2006-01-02T15:04:05Z07:00"}}"><div class="site-header"><span class="site-title">{{.Name}}</span></div></a></li>
        {{end}}{{end}}
        {{if eq (len .Items) 0}}
        <li class="empty">No sites. Drop .html files or directories into ~/.local-server/sites/</li>
        {{end}}
      </ul>
    </div>
  </div>
  <div class="section-frame log-frame" id="log-section" style="display:none">
    <h2>Activity</h2>
    <div class="log-scroll" id="log"></div>
  </div>
</div>
<script>
var IGNORED = {".DS_Store": 1, "activity.log": 1};

function timeAgo(date) {
  var total = Math.floor((Date.now() - date.getTime()) / 1000);
  var s = total % 60;
  var m = Math.floor(total / 60) % 60;
  var h = Math.floor(total / 3600) % 24;
  var d = Math.floor(total / 86400);
  if (d > 0) return d + "d " + h + "h " + m + "m " + s + "s";
  if (h > 0) return h + "h " + m + "m " + s + "s";
  if (m > 0) return m + "m " + s + "s";
  return s + "s";
}

function formatDate(date) {
  return date.toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

// Enrich a link element with title/description fetched from the file
function enrichLink(link) {
  var name = link.getAttribute("data-file");
  var fetchUrl;
  if (name.endsWith(".html")) {
    fetchUrl = "/" + name;
  } else if (name.endsWith("/")) {
    fetchUrl = "/" + name + "index.html";
  } else {
    return;
  }
  fetch(fetchUrl)
    .then(function(r) { if (!r.ok) throw r; return r.text(); })
    .then(function(html) {
      var doc = new DOMParser().parseFromString(html, "text/html");
      var title = doc.querySelector("title");
      var desc = doc.querySelector('meta[name="description"]');

      var titleDiv = link.querySelector(".site-title");
      if (title && title.textContent) {
        titleDiv.textContent = title.textContent;
      }

      if (desc && desc.getAttribute("content")) {
        var descDiv = document.createElement("div");
        descDiv.className = "site-desc";
        descDiv.textContent = desc.getAttribute("content");
        link.appendChild(descDiv);
      }

      var fileDiv = document.createElement("div");
      fileDiv.className = "site-file";
      fileDiv.textContent = name.replace(/\/$/, "");
      link.appendChild(fileDiv);
    })
    .catch(function() {});
}

// Add live ago badge (in header row) and installed-date row
function addMeta(link) {
  var mod = link.getAttribute("data-mod");
  if (!mod) return;
  var date = new Date(mod);
  if (isNaN(date)) return;

  // Live-ticking badge in the header flex row
  var header = link.querySelector(".site-header");
  if (header) {
    var ago = document.createElement("span");
    ago.className = "site-ago";
    ago.textContent = timeAgo(date);
    header.appendChild(ago);
  }

  // Installed date row at bottom
  var metaDiv = document.createElement("div");
  metaDiv.className = "site-meta";
  var installed = document.createElement("span");
  installed.textContent = "installed " + formatDate(date);
  metaDiv.appendChild(installed);
  link.appendChild(metaDiv);
}

// Add a trash button to a list item
function addDeleteButton(li) {
  var a = li.querySelector("a[data-file]");
  if (!a) return;
  var name = a.getAttribute("data-file");
  var btn = document.createElement("button");
  btn.className = "site-delete";
  btn.textContent = "\uD83D\uDDD1";
  btn.title = "Remove " + name;
  btn.addEventListener("click", function(e) {
    e.preventDefault();
    e.stopPropagation();
    var displayName = a.querySelector(".site-title").textContent || name;
    if (!confirm("Remove \"" + displayName + "\" from local sites?")) return;
    fetch("/_api/" + encodeURIComponent(name), { method: "DELETE" })
      .then(function(r) {
        if (!r.ok) throw r;
        li.parentNode.removeChild(li);
      })
      .catch(function() { alert("Failed to remove " + name); });
  });
  li.appendChild(btn);
}

// Create a new <li> for a site
function createSiteItem(name, url, mod) {
  var li = document.createElement("li");
  var a = document.createElement("a");
  a.href = url;
  a.setAttribute("data-file", name);
  a.setAttribute("data-mod", mod);

  var header = document.createElement("div");
  header.className = "site-header";
  var titleSpan = document.createElement("span");
  titleSpan.className = "site-title";
  titleSpan.textContent = name;
  header.appendChild(titleSpan);
  a.appendChild(header);

  li.appendChild(a);
  addDeleteButton(li);
  return li;
}

// Get map of current sites in DOM: name -> mod
function domSites() {
  var sites = {};
  document.querySelectorAll("#sites a[data-file]").forEach(function(a) {
    sites[a.getAttribute("data-file")] = a.getAttribute("data-mod");
  });
  return sites;
}

// Enrich initial server-rendered items
document.querySelectorAll("#sites li").forEach(function(li) {
  var link = li.querySelector("a[data-file]");
  if (!link) return;
  enrichLink(link);
  addMeta(link);
  addDeleteButton(li);
});

// Poll server for directory changes and diff the DOM
function pollSites() {
  fetch("/", { headers: { "Accept": "text/html" } })
    .then(function(r) { if (!r.ok) throw r; return r.text(); })
    .then(function(html) {
      var doc = new DOMParser().parseFromString(html, "text/html");
      var serverEntries = {};
      doc.querySelectorAll("#sites a[data-file]").forEach(function(a) {
        var name = a.getAttribute("data-file");
        if (!IGNORED[name]) {
          serverEntries[name] = {
            url: a.getAttribute("href"),
            mod: a.getAttribute("data-mod")
          };
        }
      });

      var current = domSites();
      var ul = document.getElementById("sites");

      // Remove items no longer on server
      var toRemove = [];
      ul.querySelectorAll("li").forEach(function(li) {
        var a = li.querySelector("a[data-file]");
        if (a && !serverEntries[a.getAttribute("data-file")]) {
          toRemove.push(li);
        }
      });
      toRemove.forEach(function(li) { ul.removeChild(li); });

      // Add new items
      var keys = Object.keys(serverEntries);
      keys.forEach(function(name) {
        if (!current[name]) {
          // Remove empty message if present
          var empty = ul.querySelector(".empty");
          if (empty) ul.removeChild(empty);

          var info = serverEntries[name];
          var li = createSiteItem(name, info.url, info.mod);
          ul.appendChild(li);
          var link = li.querySelector("a");
          enrichLink(link);
          addMeta(link);
        }
      });

      // Show empty message if no sites
      if (keys.length === 0 && !ul.querySelector(".empty")) {
        var emptyLi = document.createElement("li");
        emptyLi.className = "empty";
        emptyLi.textContent = "No sites. Drop .html files or directories into ~/.local-server/sites/";
        ul.appendChild(emptyLi);
      }
    })
    .catch(function() {});
}

// Live-tick ago badges every second
setInterval(function() {
  document.querySelectorAll("#sites a[data-mod]").forEach(function(link) {
    var mod = link.getAttribute("data-mod");
    if (!mod) return;
    var date = new Date(mod);
    if (isNaN(date)) return;
    var ago = link.querySelector(".site-ago");
    if (ago) ago.textContent = timeAgo(date);
  });
}, 1000);

// Poll for directory changes every 5 seconds (no page reload)
setInterval(pollSites, 5000);

// Activity log
var lastLogLength = 0;

function pollLog() {
  fetch("/activity.log")
    .then(function(r) {
      if (!r.ok) throw r;
      return r.text();
    })
    .then(function(text) {
      if (!text.trim()) return;
      // Only update if content changed
      if (text.length === lastLogLength) return;
      lastLogLength = text.length;

      var section = document.getElementById("log-section");
      section.style.display = "";
      var logDiv = document.getElementById("log");

      // Clear and rebuild (log is small)
      while (logDiv.firstChild) logDiv.removeChild(logDiv.firstChild);

      var lines = text.trim().split("\n").filter(Boolean);
      // Show last 50, oldest to newest (newest at bottom)
      lines.slice(-50).forEach(function(line) {
        try {
          var entry = JSON.parse(line);
          var div = document.createElement("div");
          div.className = "log-entry";

          var time = document.createElement("span");
          time.className = "log-time";
          var d = new Date(entry.time);
          time.textContent = d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
          div.appendChild(time);

          var action = document.createElement("span");
          action.className = "log-action log-" + entry.action;
          action.textContent = entry.action;
          div.appendChild(action);

          var name = document.createElement("span");
          name.className = "log-name";
          name.textContent = entry.title || entry.name;
          div.appendChild(name);

          if (entry.title && entry.title !== entry.name) {
            var file = document.createElement("span");
            file.className = "log-file";
            file.textContent = entry.name;
            div.appendChild(file);
          }

          if (entry.description) {
            var desc = document.createElement("span");
            desc.className = "log-desc";
            desc.textContent = entry.description;
            div.appendChild(desc);
          }

          if (entry.duration) {
            var dur = document.createElement("span");
            dur.className = "log-desc";
            dur.textContent = "(" + entry.duration + ")";
            div.appendChild(dur);
          }

          logDiv.appendChild(div);
        } catch(e) {}
      });
      // Auto-scroll to bottom (newest entries)
      logDiv.scrollTop = logDiv.scrollHeight;
    })
    .catch(function() {});
}

// Poll log every 5 seconds
pollLog();
setInterval(pollLog, 5000);
</script>
</body>
</html>
