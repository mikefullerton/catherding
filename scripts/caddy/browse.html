<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local Sites</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #14141a;
  --surface-hover: #1c1c24;
  --border: #2a2a36;
  --text: #e8e6e3;
  --text-muted: #8a8a9a;
  --text-dim: #5a5a6a;
  --accent: #c4a35a;
  --accent-dim: rgba(196, 163, 90, 0.15);
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'Manrope', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  display: flex; justify-content: center;
  padding: 4rem 1.5rem;
}
::selection { background: var(--accent-dim); color: var(--accent); }
.grain {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 9999;
}
.container { max-width: 640px; width: 100%; }
h1 {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 0.3rem;
}
.subtitle {
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  margin-bottom: 2.5rem;
}
ul { list-style: none; }
ul li {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.6rem;
  transition: border-color 0.2s, background 0.2s;
}
ul li:hover {
  border-color: var(--accent);
  background: var(--surface-hover);
}
ul li a {
  display: block;
  padding: 1rem 1.2rem;
  color: var(--text);
  text-decoration: none;
}
.site-title {
  font-size: 0.95rem;
  font-weight: 500;
}
li:hover .site-title { color: var(--accent); }
.site-desc {
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 300;
  margin-top: 0.2rem;
}
.site-file {
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.7rem;
  margin-top: 0.3rem;
}
.site-meta {
  display: flex; gap: 1.5rem;
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 0.7rem;
  margin-top: 0.25rem;
}
.empty {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 1rem 0;
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <h1>Local Sites</h1>
  <p class="subtitle">~/.local-server/sites</p>
  <ul id="sites">
    {{range .Items}}{{if ne .Name ".DS_Store"}}
    <li><a href="{{.URL}}" data-file="{{.Name}}" data-mod="{{.ModTime.Format "2006-01-02T15:04:05Z07:00"}}"><div class="site-title">{{.Name}}</div></a></li>
    {{end}}{{end}}
    {{if eq (len .Items) 0}}
    <li class="empty">No sites. Drop .html files or directories into ~/.local-server/sites/</li>
    {{end}}
  </ul>
</div>
<script>
document.querySelectorAll("#sites a[data-file]").forEach(function(link) {
  var name = link.getAttribute("data-file");
  // Determine fetch URL: .html files directly, directories via index.html
  var fetchUrl;
  if (name.endsWith(".html")) {
    fetchUrl = "/" + name;
  } else if (name.endsWith("/")) {
    fetchUrl = "/" + name + "index.html";
  } else {
    return;
  }
  fetch(fetchUrl)
    .then(function(r) { if (!r.ok) throw r; return r.text(); })
    .then(function(html) {
      var doc = new DOMParser().parseFromString(html, "text/html");
      var title = doc.querySelector("title");
      var desc = doc.querySelector('meta[name="description"]');

      var titleDiv = link.querySelector(".site-title");
      if (title && title.textContent) {
        titleDiv.textContent = title.textContent;
      }

      if (desc && desc.getAttribute("content")) {
        var descDiv = document.createElement("div");
        descDiv.className = "site-desc";
        descDiv.textContent = desc.getAttribute("content");
        link.appendChild(descDiv);
      }

      var fileDiv = document.createElement("div");
      fileDiv.className = "site-file";
      fileDiv.textContent = name.replace(/\/$/, "");
      link.appendChild(fileDiv);
    })
    .catch(function() {});
});

function timeAgo(date) {
  var s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + "s";
  var m = Math.floor(s / 60);
  if (m < 60) return m + "m";
  var h = Math.floor(m / 60);
  if (h < 24) return h + "h " + (m % 60) + "m";
  var d = Math.floor(h / 24);
  return d + "d " + (h % 24) + "h";
}

function formatDate(date) {
  return date.toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

document.querySelectorAll("#sites a[data-mod]").forEach(function(link) {
  var mod = link.getAttribute("data-mod");
  if (!mod) return;
  var date = new Date(mod);
  if (isNaN(date)) return;

  var metaDiv = document.createElement("div");
  metaDiv.className = "site-meta";

  var installed = document.createElement("span");
  installed.textContent = "installed " + formatDate(date);
  metaDiv.appendChild(installed);

  var ago = document.createElement("span");
  ago.textContent = timeAgo(date) + " ago";
  metaDiv.appendChild(ago);

  link.appendChild(metaDiv);
});

// Update ago counters every minute
setInterval(function() {
  document.querySelectorAll("#sites a[data-mod]").forEach(function(link) {
    var mod = link.getAttribute("data-mod");
    if (!mod) return;
    var date = new Date(mod);
    if (isNaN(date)) return;
    var metaDiv = link.querySelector(".site-meta");
    if (metaDiv && metaDiv.children.length >= 2) {
      metaDiv.children[1].textContent = timeAgo(date) + " ago";
    }
  });
}, 60000);

setTimeout(function() { location.reload(); }, 5000);
</script>
</body>
</html>
