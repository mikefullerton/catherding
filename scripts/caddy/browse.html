<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local Sites</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #1a1a2e; color: #e0e0e0;
    display: flex; justify-content: center;
    padding: 3rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 1.4rem; color: #8888cc; margin-bottom: 0.5rem; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }
  ul { list-style: none; }
  ul li {
    border: 1px solid #2a2a4a; border-radius: 6px;
    margin-bottom: 0.5rem; transition: border-color 0.15s;
  }
  ul li:hover { border-color: #8888cc; }
  ul li a {
    display: block; padding: 0.8rem 1rem;
    color: #c0c0e0; text-decoration: none;
  }
  ul li a:hover { color: #fff; }
  .site-title { font-size: 0.95rem; }
  .site-desc { color: #777; font-size: 0.8rem; margin-top: 0.2rem; }
  .site-file { color: #555; font-size: 0.7rem; margin-top: 0.15rem; }
  .empty { color: #555; font-style: italic; padding: 0.8rem 0; }
</style>
</head>
<body>
<div class="container">
  <h1>Local Sites</h1>
  <p class="subtitle">~/.local-server/sites</p>
  <ul id="sites">
    {{range .Items}}{{if ne .Name ".DS_Store"}}
    <li><a href="{{.URL}}" data-file="{{.Name}}"><div class="site-title">{{.Name}}</div></a></li>
    {{end}}{{end}}
    {{if eq (len .Items) 0}}
    <li class="empty">No sites. Drop .html files into ~/.local-server/sites/</li>
    {{end}}
  </ul>
</div>
<script>
document.querySelectorAll("#sites a[data-file]").forEach(function(link) {
  var file = link.getAttribute("data-file");
  if (!file.endsWith(".html")) return;
  fetch("/" + file)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var doc = new DOMParser().parseFromString(html, "text/html");
      var title = doc.querySelector("title");
      var desc = doc.querySelector('meta[name="description"]');

      var titleDiv = link.querySelector(".site-title");
      if (title && title.textContent) {
        titleDiv.textContent = title.textContent;
      }

      if (desc && desc.getAttribute("content")) {
        var descDiv = document.createElement("div");
        descDiv.className = "site-desc";
        descDiv.textContent = desc.getAttribute("content");
        link.appendChild(descDiv);
      }

      var fileDiv = document.createElement("div");
      fileDiv.className = "site-file";
      fileDiv.textContent = file;
      link.appendChild(fileDiv);
    })
    .catch(function() {});
});

setTimeout(function() { location.reload(); }, 5000);
</script>
</body>
</html>
